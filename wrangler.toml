# Cloudflare Workers + Static Assets config for the Splitea
# web client. The Vite build emits the SPA into `dist/`; the
# Worker serves those files with SPA-routing fallback (any path
# the assets bundle doesn't match returns `index.html`).
#
# Pairs with the existing splitea-shares worker:
#  - splitea-shares owns: /r/<id>, /live/*, /.well-known/*, favicons
#  - splitea-web owns:  everything else under splitea.app
#
# Cloudflare's route-precedence model means specific worker
# routes win — the splitea-shares routes keep working unchanged
# even when this worker is bound to splitea.app/*.
#
# Deploy:    `npx wrangler deploy`
# Develop:   `npm run dev`  (Vite dev server, no Worker)

name = "splitea-web"
compatibility_date = "2025-04-01"

# Disable the auto-generated `*.workers.dev` URL — splitea.app
# is the only public surface we want. Cloudflare warns when
# this isn't explicitly set; setting it false silences the
# warning AND keeps the worker private outside its custom
# routes.
workers_dev = false
preview_urls = false

# Custom-domain routing. NOTE: `routes` MUST be declared at
# the TOML top level, not under `[assets]`. Putting it after
# the `[assets]` table header would scope it as `assets.routes`
# (which Wrangler then warns about as "unexpected field").
routes = [
  { pattern = "splitea.app/*",     zone_name = "splitea.app" },
  { pattern = "dev.splitea.app/*", zone_name = "splitea.app" },
]

# Static-assets-only worker (no `main`, no Worker code). Vite's
# `dist/` directory is what Cloudflare serves. Equivalent in
# behavior to Cloudflare Pages but uses the modern unified
# Workers Static Assets API.
[assets]
directory = "./dist"
# `single-page-application` makes any unknown path return
# index.html with status 200, which is what `@solidjs/router`
# expects for client-side routing.
not_found_handling = "single-page-application"
