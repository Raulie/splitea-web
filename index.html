<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Theme-color drives the browser URL bar / status bar
         tint on mobile. Split per scheme so it matches the
         body background in each mode. -->
    <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <!-- Tell the browser we support both modes. Combined
         with the @media (prefers-color-scheme: dark)
         palette swap in src/index.css, this opts the page
         out of Chromium's force-dark inversion — instead
         force-dark just flips `prefers-color-scheme` and
         our own rules handle it. -->
    <meta name="color-scheme" content="light dark" />
    <title>Splitea</title>

    <!-- Reuses the same icons the worker already serves at the
         apex (`/apple-touch-icon.png`, `/favicon-*.png`). When
         this SPA is deployed to the same domain the icons are
         already there; in the unlikely event it's hosted
         elsewhere, the worker URL still works as the source. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <!-- Inter as the cross-platform fallback for SF Pro. Apple
         devices won't fetch this — `-apple-system` resolves
         locally first. -->
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <!-- Squircle feature probe. `@supports (corner-shape:
         superellipse(3))` is unreliable: Chrome's parser
         accepts the declaration syntactically (the property
         shipped behind a flag in Blink) and reports support
         even though it doesn't actually render the curve, so
         the `@supports not (...)` fallback in index.css never
         fires there. Samsung Internet runs an older Blink that
         doesn't parse the property, which is why it picked up
         the bumped radii while Chrome Android kept the
         tighter circular corners.

         Probe instead: only WebKit (Safari + iOS WKWebView)
         actually paints the superellipse today, and only
         WebKit exposes `-webkit-touch-callout`. Mirror that as
         the gate — if the browser doesn't understand
         `-webkit-touch-callout: none`, treat it as a non-
         squircle renderer and tag <html> with `.no-squircle`
         so index.css can swap in the larger radii. Runs
         inline before any CSS is applied, so paint never
         flashes the wrong radius. -->
    <script>
      (function () {
        try {
          if (!CSS.supports('-webkit-touch-callout', 'none')) {
            document.documentElement.classList.add('no-squircle');
          }
        } catch (e) {
          document.documentElement.classList.add('no-squircle');
        }
      })();
    </script>
  </head>
  <body class="bg-ios-bg text-ios-label">
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
